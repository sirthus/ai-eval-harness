# CI workflow for ai-eval-harness
#
# IMPORTANT: This workflow never calls the Anthropic API.
# All tests use synthetic fixtures or mocked API calls.
# The quality-gate job is advisory (continue-on-error: true) — it reports
# on historical evaluation results and does not block PR merges.
#
# Jobs:
#   lint          — blocking: runs Ruff on the repo
#   test          — blocking: runs pytest on Python 3.12 and 3.13
#   quality-gate  — advisory: checks run manifests for evaluation regressions

name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: make install

      - name: Run Ruff
        run: make lint

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test-cov

  quality-gate:
    name: Quality Gate (advisory)
    runs-on: ubuntu-latest
    needs: test
    # Advisory only — evaluation failures should not block code merges.
    # A "fail" result here means historical runs scored poorly, not that
    # the code is broken. Investigate separately.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Check quality gate
        # Exits 0 if data/runs/ is empty (no committed manifests).
        # Exits 0 if all recent runs pass.
        # Exits 1 (advisory, not blocking) if recent runs failed.
        run: python scripts/check_quality_gate.py --runs-dir data/runs --last 5
